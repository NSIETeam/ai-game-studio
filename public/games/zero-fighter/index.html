<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>零式 - 3D 空战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;color:#fff;font-family:sans-serif;user-select:none}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud{position:absolute;top:20px;left:20px;font:13px monospace}
#hud .r{margin:3px 0}
#hud .l{color:#666}
#hud .v{color:#8f8}
#hud .w{color:#f88}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.4)}
#crosshair::before{width:1px;height:100%;left:50%}
#crosshair::after{width:100%;height:1px;top:50%}
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.95);z-index:100;pointer-events:all}
#menu h1{font-size:48px;color:#fff;font-weight:200;letter-spacing:12px;margin-bottom:10px}
#menu .sub{color:#666;font-size:12px;margin-bottom:30px;letter-spacing:4px}
.btn{background:transparent;border:1px solid #444;color:#aaa;padding:10px 48px;margin:6px;font:15px sans-serif;cursor:pointer;letter-spacing:3px;transition:.2s}
.btn:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.04)}
#toast{position:absolute;top:30%;left:50%;transform:translateX(-50%);color:#fff;font-size:24px;text-shadow:0 0 20px rgba(255,255,255,.5);opacity:0;transition:.3s}
#gameover{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:110;pointer-events:all}
#gameover h2{font-size:36px;color:#f88;margin-bottom:20px}
#gameover .stat{color:#aaa;margin:5px}
</style>
</head>
<body>
<div id="menu">
  <h1>零&emsp;式</h1>
  <div class="sub">⚡ 3D DOGFIGHTER ⚡</div>
  <button class="btn" onclick="startGame()">开始游戏</button>
  <div class="sub" style="margin-top:20px">W/S 俯仰 · A/D 滚转 · 空格 射击</div>
</div>

<div id="gameover">
  <h2>任务完成!</h2>
  <div class="stat">击落敌机：<span id="finalKills">0</span></div>
  <button class="btn" onclick="location.reload()" style="margin-top:20px">再来一局</button>
</div>

<div id="ui" style="display:none">
  <div id="hud">
    <div class="r"><span class="l">HP </span><span class="v" id="hpV">100</span></div>
    <div class="r"><span class="l">SPD </span><span class="v" id="spdV">0</span></div>
    <div class="r"><span class="l">KILLS </span><span class="v" id="killV">0/10</span></div>
  </div>
  <div id="crosshair"></div>
  <div id="toast">KILL!</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== 游戏状态 ==========
let scene, camera, renderer, player;
let enemies = [], bullets = [], explosions = [];
let keys = {}, mouseX = 0, mouseY = 0;
let gameRunning = false, hp = 100, kills = 0, enemySpawnTimer = 0;
const TOTAL_ENEMIES = 10;

// ========== 初始化 ==========
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000810);
  scene.fog = new THREE.Fog(0x000810, 50, 150);
  
  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 300);
  
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  document.body.insertBefore(renderer.domElement, document.body.firstChild);
  
  // 灯光
  scene.add(new THREE.AmbientLight(0x334455, 0.5));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(30, 40, 20);
  scene.add(sun);
  
  // 星空
  const stars = new THREE.BufferGeometry();
  const starPos = new Float32Array(1000*3);
  for(let i=0;i<1000;i++){
    starPos[i*3]=(Math.random()-0.5)*200;
    starPos[i*3+1]=(Math.random()-0.5)*200;
    starPos[i*3+2]=(Math.random()-0.5)*200-50;
  }
  stars.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  scene.add(new THREE.Points(stars, new THREE.PointsMaterial({color:0xffffff,size:0.3})));
  
  // 海洋
  const ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500, 50, 50),
    new THREE.MeshStandardMaterial({color:0x001133,roughness:0.2,metalness:0.8,flatShading:true})
  );
  ocean.rotation.x = -Math.PI/2;
  ocean.position.y = -10;
  scene.add(ocean);
  
  // 玩家
  player = createPlayer();
  scene.add(player);
  
  // 事件
  window.addEventListener('resize', onResize);
  document.addEventListener('keydown', e => keys[e.key]=true);
  document.addEventListener('keyup', e => keys[e.key]=false);
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX/window.innerWidth - 0.5) * 2;
    mouseY = -(e.clientY/window.innerHeight - 0.5) * 2;
  });
  
  onResize();
  animate();
}

// ========== 创建玩家飞机 ==========
function createPlayer() {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color:0xbb8855,roughness:0.5,metalness:0.3,flatShading:true});
  
  // 机身
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.5,1.8,8,1), mat);
  body.rotation.x = Math.PI/2;
  body.position.z = -0.35;
  g.add(body);
  
  // 机翼
  const wing = new THREE.Mesh(new THREE.BoxGeometry(2.0,0.02,0.2), mat);
  wing.position.z = 0.1;
  wing.rotation.x = -0.08;
  g.add(wing);
  
  // 尾翼
  const tail = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.02,0.2), mat);
  tail.position.z = -1.1;
  g.add(tail);
  
  // 螺旋桨
  const prop = new THREE.Group();
  for(let i=0;i<3;i++){
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.3,0.01), new THREE.MeshStandardMaterial({color:0x333}));
    blade.position.z = 0.8;
    blade.rotation.z = (i/3)*Math.PI*2;
    prop.add(blade);
  }
  g.add(prop);
  g.userData.prop = prop;
  
  // 线框
  const wire = new THREE.LineSegments(
    new THREE.EdgesGeometry(body.geometry),
    new THREE.LineBasicMaterial({color:0xccaaff,transparent:true,opacity:0.3})
  );
  wire.rotation.x = Math.PI/2;
  wire.position.z = -0.35;
  g.add(wire);
  
  g.position.set(0, 0, 10);
  g.userData = {speed: 0, pitch: 0, roll: 0, yaw: 0, fireTimer: 0};
  return g;
}

// ========== 创建敌机 ==========
function spawnEnemy() {
  const e = createPlayer();
  e.userData = {
    speed: 15 + Math.random() * 5,
    hp: 2,
    dir: new THREE.Vector3(0, 0, -1),
    wobble: Math.random() * Math.PI * 2
  };
  e.position.set(
    (Math.random() - 0.5) * 60,
    Math.random() * 20 - 5,
    -50 - Math.random() * 30
  );
  e.traverse(c => {
    if(c.material && c.material.color) c.material.color.setHex(0x884444);
  });
  scene.add(e);
  enemies.push(e);
}

// ========== 创建子弹 ==========
function shoot() {
  const b = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 4, 4),
    new THREE.MeshStandardMaterial({color:0xffcc44,emissive:0xff8800,emissiveIntensity:2})
  );
  b.position.copy(player.position);
  b.position.z -= 1;
  b.userData = {speed: 80, life: 2};
  scene.add(b);
  bullets.push(b);
}

// ========== 爆炸特效 ==========
function explode(pos, color, count) {
  for(let i=0;i<count;i++){
    const p = new THREE.Mesh(
      new THREE.BoxGeometry(0.1+Math.random()*0.2, 0.1+Math.random()*0.2, 0.1+Math.random()*0.2),
      new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:2,transparent:true,opacity:1})
    );
    p.position.copy(pos);
    p.position.x += (Math.random()-0.5)*0.5;
    p.position.y += (Math.random()-0.5)*0.5;
    p.position.z += (Math.random()-0.5)*0.5;
    p.userData = {vel: new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10), life: 0.5+Math.random()*0.5};
    scene.add(p);
    explosions.push(p);
  }
}

// ========== 更新玩家 ==========
function updatePlayer(dt) {
  const pd = player.userData;
  
  // 速度
  pd.speed += (20 - pd.speed) * dt * 0.5;
  
  // 控制
  if(keys['w']||keys['W']) pd.pitch = Math.min(pd.pitch + dt*3, 1);
  else if(keys['s']||keys['S']) pd.pitch = Math.max(pd.pitch - dt*3, -1);
  else pd.pitch *= 0.9;
  
  if(keys['a']||keys['A']) pd.roll += dt*4;
  if(keys['d']||keys['D']) pd.roll -= dt*4;
  pd.roll *= 0.95;
  
  pd.yaw += (mouseX * 0.7 + pd.roll * 0.3) * dt;
  pd.yaw *= 0.9;
  
  // 应用旋转
  const euler = new THREE.Euler(pd.pitch*0.8 + mouseY*0.4, pd.yaw*0.5, pd.roll*0.35, 'YXZ');
  player.quaternion.setFromEuler(euler);
  
  // 前进
  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
  player.position.add(fwd.clone().multiplyScalar(pd.speed * dt));
  
  // 螺旋桨
  if(player.userData.prop) player.userData.prop.rotation.z += dt * pd.speed * 20;
  
  // 射击
  pd.fireTimer -= dt;
  if(keys[' '] && pd.fireTimer <= 0) {
    pd.fireTimer = 0.15;
    shoot();
  }
  
  // 相机跟随
  camera.position.lerp(new THREE.Vector3(0, 3, 8).applyQuaternion(player.quaternion).add(player.position), dt * 4);
  camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 0, -10).applyQuaternion(player.quaternion)));
  
  // HUD
  document.getElementById('spdV').textContent = Math.round(pd.speed);
  document.getElementById('hpV').textContent = Math.max(0, Math.round(hp));
  document.getElementById('killV').textContent = kills + '/' + TOTAL_ENEMIES;
  
  if(hp <= 0) gameOver(false);
}

// ========== 更新敌机 ==========
function updateEnemies(dt) {
  for(let i=enemies.length-1; i>=0; i--){
    const e = enemies[i];
    const ud = e.userData;
    
    // 追踪玩家
    const dir = new THREE.Vector3().subVectors(player.position, e.position).normalize();
    e.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,-1), dir), dt * 0.5);
    e.position.add(new THREE.Vector3(0, 0, -1).applyQuaternion(e.quaternion).multiplyScalar(ud.speed * dt));
    
    // 波动
    ud.wobble += dt;
    e.position.y += Math.sin(ud.wobble) * dt * 0.3;
    
    // 清理过远
    if(e.position.distanceTo(player.position) > 100) {
      scene.remove(e);
      enemies.splice(i, 1);
    }
  }
}

// ========== 更新子弹 ==========
function updateBullets(dt) {
  for(let i=bullets.length-1; i>=0; i--){
    const b = bullets[i];
    b.userData.life -= dt;
    if(b.userData.life <= 0) {
      scene.remove(b);
      bullets.splice(i, 1);
      continue;
    }
    b.position.z -= b.userData.speed * dt;
    
    // 击中检测
    for(let j=enemies.length-1; j>=0; j--){
      const e = enemies[j];
      if(b.position.distanceTo(e.position) < 2) {
        e.userData.hp--;
        explode(b.position, 0xffaa44, 5);
        if(e.userData.hp <= 0) {
          kills++;
          explode(e.position, 0xff6600, 20);
          showToast('KILL!');
          scene.remove(e);
          enemies.splice(j, 1);
          if(kills >= TOTAL_ENEMIES) gameOver(true);
        }
        scene.remove(b);
        bullets.splice(i, 1);
        break;
      }
    }
  }
}

// ========== 更新爆炸 ==========
function updateExplosions(dt) {
  for(let i=explosions.length-1; i>=0; i--){
    const p = explosions[i];
    p.userData.life -= dt;
    if(p.userData.life <= 0) {
      scene.remove(p);
      explosions.splice(i, 1);
      continue;
    }
    p.position.add(p.userData.vel.clone().multiplyScalar(dt));
    p.userData.vel.y -= dt * 5;
    p.material.opacity = p.userData.life;
    p.rotation.x += dt * 5;
    p.rotation.y += dt * 3;
  }
}

// ========== 生成敌机 ==========
function updateSpawning(dt) {
  if(enemies.length + kills < TOTAL_ENEMIES) {
    enemySpawnTimer -= dt;
    if(enemySpawnTimer <= 0) {
      enemySpawnTimer = 3;
      spawnEnemy();
    }
  }
}

// ========== 动画循环 ==========
function animate() {
  requestAnimationFrame(animate);
  
  if(gameRunning) {
    const dt = 1/60;
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateExplosions(dt);
    updateSpawning(dt);
  }
  
  renderer.render(scene, camera);
}

// ========== 工具函数 ==========
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 600);
}

function gameOver(win) {
  gameRunning = false;
  document.getElementById('gameover').style.display = 'flex';
  document.getElementById('finalKills').textContent = kills;
  document.querySelector('#gameover h2').textContent = win ? '任务完成!' : '任务失败';
  document.querySelector('#gameover h2').style.color = win ? '#8f8' : '#f88';
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  if(!gameRunning) {
    init();
    gameRunning = true;
  }
}

window.addEventListener('load', () => console.log('Page loaded'));
</script>
</body>
</html>
