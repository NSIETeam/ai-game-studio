<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>零式 - 3D 空战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud{position:absolute;top:20px;left:20px;font:13px monospace}
#hud .r{margin:3px 0}
#hud .l{color:#666}
#hud .v{color:#8f8}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.3)}
#crosshair::before{width:1px;height:100%;left:50%}
#crosshair::after{width:100%;height:1px;top:50%}
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:100;pointer-events:all}
#menu h1{font-size:48px;color:#fff;font-weight:200;letter-spacing:12px;margin-bottom:10px}
#menu .sub{color:#555;font-size:12px;margin-bottom:30px;letter-spacing:6px}
.btn{background:transparent;border:1px solid #444;color:#aaa;padding:10px 48px;margin:6px;font:15px sans-serif;cursor:pointer;letter-spacing:3px;transition:.2s}
.btn:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.04)}
</style>
</head>
<body>
<div id="menu">
  <h1>零&emsp;式</h1>
  <div class="sub">⚡ PROCESS SHADED DOGFIGHT ⚡</div>
  <button class="btn" onclick="startGame()">START GAME</button>
  <div class="sub" style="margin-top:30px;color:#333">W/S 俯仰 · A/D 滚转 · Shift 加速 · Ctrl 减速 · 空格 射击</div>
</div>

<div id="ui" style="display:none">
  <div id="hud">
    <div class="r"><span class="l">HP </span><span class="v" id="hpV">100</span></div>
    <div class="r"><span class="l">SPD </span><span class="v" id="spdV">0</span></div>
    <div class="r"><span class="l">ALT </span><span class="v" id="altV">0</span></div>
    <div class="r"><span class="l">KILLS </span><span class="v" id="killV">0</span></div>
  </div>
  <div id="crosshair"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
console.log('Three.js loaded');

let scene, camera, renderer, player;
let keys = {}, mouseX = 0, mouseY = 0;
let gameRunning = false;

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 6);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.insertBefore(renderer.domElement, document.body.firstChild);
  
  // 灯光
  const ambient = new THREE.AmbientLight(0x444444, 0.5);
  scene.add(ambient);
  
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(30, 40, 20);
  scene.add(sun);
  
  // 创建玩家飞机
  player = createPlane();
  scene.add(player);
  
  // 事件监听
  window.addEventListener('resize', onResize);
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('mousemove', onMouseMove);
  
  onResize();
  animate();
}

function createPlane() {
  const group = new THREE.Group();
  
  // 机身
  const bodyGeo = new THREE.CylinderGeometry(0.1, 0.5, 1.8, 8, 1);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xbb8855, roughness: 0.5, metalness: 0.3, flatShading: true });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.x = Math.PI / 2;
  body.position.z = -0.35;
  group.add(body);
  
  // 机翼
  const wingGeo = new THREE.BoxGeometry(2.0, 0.02, 0.2);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0xbb8855, roughness: 0.5, metalness: 0.3, flatShading: true });
  
  const wingL = new THREE.Mesh(wingGeo, wingMat);
  wingL.position.set(-1.0, 0.02, 0.1);
  wingL.rotation.x = -0.08;
  group.add(wingL);
  
  const wingR = new THREE.Mesh(wingGeo, wingMat);
  wingR.position.set(1.0, 0.02, 0.1);
  wingR.rotation.x = -0.08;
  group.add(wingR);
  
  // 尾翼
  const tailGeo = new THREE.BoxGeometry(1.0, 0.02, 0.2);
  const tail = new THREE.Mesh(tailGeo, wingMat);
  tail.position.set(0, 0.02, -1.1);
  group.add(tail);
  
  // 螺旋桨
  const propGeo = new THREE.BoxGeometry(0.03, 0.3, 0.01);
  const propMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.3, flatShading: true });
  
  const propGroup = new THREE.Group();
  for (let i = 0; i < 3; i++) {
    const blade = new THREE.Mesh(propGeo, propMat);
    blade.position.set(0, 0, 0.8);
    blade.rotation.z = (i / 3) * Math.PI * 2;
    propGroup.add(blade);
  }
  group.add(propGroup);
  group.userData.propeller = propGroup;
  
  // 线框轮廓
  const wireMat = new THREE.LineBasicMaterial({ color: 0xccaaff, transparent: true, opacity: 0.3 });
  const bodyWire = new THREE.LineSegments(new THREE.EdgesGeometry(bodyGeo), wireMat);
  bodyWire.rotation.x = Math.PI / 2;
  bodyWire.position.z = -0.35;
  group.add(bodyWire);
  
  group.scale.set(0.8, 0.8, 0.8);
  return group;
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onKeyDown(e) {
  keys[e.key] = true;
}

function onKeyUp(e) {
  keys[e.key] = false;
}

function onMouseMove(e) {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = -(e.clientY / window.innerHeight - 0.5) * 2;
}

function updatePlayer(deltaTime) {
  if (!player) return;
  
  const speed = 20;
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
  player.position.add(forward.clone().multiplyScalar(speed * deltaTime));
  
  // 旋转
  const pitch = mouseY * 0.5;
  const yaw = mouseX * 0.5;
  const roll = keys['a'] ? -0.05 : keys['d'] ? 0.05 : 0;
  
  const euler = new THREE.Euler(pitch, yaw, roll, 'YXZ');
  player.quaternion.setFromEuler(euler);
  
  // 螺旋桨旋转
  if (player.userData.propeller) {
    player.userData.propeller.rotation.z += deltaTime * 100;
  }
  
  // 更新 HUD
  document.getElementById('spdV').textContent = Math.round(speed);
  document.getElementById('altV').textContent = Math.round(player.position.y);
}

function animate() {
  requestAnimationFrame(animate);
  
  if (gameRunning) {
    const deltaTime = 1/60;
    updatePlayer(deltaTime);
  }
  
  renderer.render(scene, camera);
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  
  if (!gameRunning) {
    initScene();
    gameRunning = true;
  }
}

// 初始化
window.addEventListener('load', () => {
  console.log('Page loaded');
});
</script>
</body>
</html>
