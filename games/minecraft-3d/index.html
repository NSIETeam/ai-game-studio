<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MiniCraft 3D</title>
<style>
*{margin:0;padding:0;overflow:hidden}
body{background:#000}
canvas{display:block}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;color:#fff;font-size:24px;font-family:Arial,sans-serif;text-shadow:0 0 2px #000;z-index:10;line-height:1;user-select:none}
#crosshair::before{content:'+';display:block;font-weight:100;opacity:.85}#crosshair.target::before{content:'▣';font-weight:400;opacity:1;text-shadow:0 0 8px #fff}
#hotbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;user-select:none}
.slot{width:48px;height:48px;border:2px solid rgba(255,255,255,.4);border-radius:4px;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s}
.slot.active{border-color:#fff;background:rgba(255,255,255,.15)}
.slot canvas{width:32px;height:32px;image-rendering:pixelated}
#info{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;font:14px/1.4 Arial,sans-serif;text-shadow:0 0 4px #000;text-align:center;z-index:10;pointer-events:none;user-select:none;opacity:.6;white-space:nowrap}
#blocker{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:Arial,sans-serif;cursor:pointer}
#blocker h1{font-size:36px;margin-bottom:12px;letter-spacing:2px}
#blocker p{font-size:16px;opacity:.8}
#blocker .keys{margin-top:24px;font-size:13px;opacity:.6;line-height:1.8;text-align:center}
.inv-count{position:absolute;bottom:1px;right:3px;font-size:9px;color:#fff;background:rgba(0,0,0,.6);padding:0 3px;border-radius:2px;pointer-events:none}
.slot{position:relative}
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="hotbar"></div>
<div id="info">WASD 移动 · 鼠标视角 · 左键破坏 · 右键放置 · 1-4 切换方块 · 空格跳跃</div>
<div id="blocker">
  <h1>MiniCraft 3D</h1>
  <p>点击进入游戏</p>
  <div class="keys">
    WASD 移动 · 鼠标控制视角<br>
    左键破坏 · 右键放置方块<br>
    1-4 切换方块类型 · 空格跳跃
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ===== TEXTURE GENERATOR =====
function makeTex(r,g,b,detail=true){
  const c=document.createElement('canvas');c.width=16;c.height=16;
  const ctx=c.getContext('2d');
  ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(0,0,16,16);
  if(detail){
    for(let i=0;i<20;i++){
      ctx.fillStyle=`rgba(${r+30},${g+30},${b+30},.3)`;
      const x=Math.random()*12|0,y=Math.random()*12|0,w=Math.random()*4+1|0,h=Math.random()*4+1|0;
      ctx.fillRect(x,y,w,h);
      ctx.fillStyle=`rgba(${r-20},${g-20},${b-20},.2)`;
      ctx.fillRect(Math.random()*14|0,Math.random()*14|0,Math.random()*3+1|0,Math.random()*3+1|0);
    }
  }
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;return tex;
}

const TEX = {
  grass_top: makeTex(100,180,70),
  grass_side: (()=>{
    const c=document.createElement('canvas');c.width=16;c.height=16;
    const ctx=c.getContext('2d');
    ctx.fillStyle='rgb(140,110,70)';ctx.fillRect(0,0,16,16);
    for(let i=0;i<12;i++){
      ctx.fillStyle=`rgba(100,180,70,.5)`;
      ctx.fillRect(Math.random()*14|0,0,3,Math.random()*4+2|0);
    }
    const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;return tex;
  })(),
  grass_bottom: makeTex(140,110,70),
  dirt: makeTex(140,110,70),
  stone: makeTex(120,120,120,true),
  wood_side: (()=>{
    const c=document.createElement('canvas');c.width=16;c.height=16;
    const ctx=c.getContext('2d');
    ctx.fillStyle='rgb(140,110,80)';ctx.fillRect(0,0,16,16);
    for(let y=0;y<16;y+=4){ctx.fillStyle='rgb(110,85,60)';ctx.fillRect(0,y,16,1);ctx.fillStyle='rgb(160,130,90)';ctx.fillRect(0,y+1,16,1);}
    const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;return tex;
  })(),
  wood_top: makeTex(155,125,95),
  leaves: (()=>{
    const c=document.createElement('canvas');c.width=16;c.height=16;
    const ctx=c.getContext('2d');
    ctx.fillStyle='rgba(60,140,40,.85)';ctx.fillRect(0,0,16,16);
    for(let i=0;i<30;i++){
      ctx.fillStyle=`rgba(${60+Math.random()*60},${140+Math.random()*60},${40+Math.random()*40},.6)`;
      ctx.fillRect(Math.random()*14|0,Math.random()*14|0,Math.random()*3+2|0,Math.random()*3+2|0);
    }
    const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;return tex;
  })()
};

// ===== WATER TEXTURE =====
const waterTex=(()=>{
  const can=document.createElement('canvas');can.width=16;can.height=16;
  const ctx=can.getContext('2d');
  ctx.fillStyle='rgb(20,80,140)';ctx.fillRect(0,0,16,16);
  for(let i=0;i<40;i++){ctx.fillStyle='rgba(60,140,220,0.3)';ctx.fillRect(Math.random()*14|0,Math.random()*14|0,3,1);}
  const t=new THREE.CanvasTexture(can);t.needsUpdate=true;return t;
})();

// ===== BLOCK TYPES =====
const BLOCKS = {
  grass:{name:'草地', tex:['grass_side','grass_side','grass_top','grass_bottom','grass_side','grass_side']},
  dirt:{name:'泥土', tex:['dirt','dirt','dirt','dirt','dirt','dirt']},
  stone:{name:'石头', tex:['stone','stone','stone','stone','stone','stone']},
  wood:{name:'木头', tex:['wood_side','wood_side','wood_top','wood_top','wood_side','wood_side']},
  leaves:{name:'树叶', tex:['leaves','leaves','leaves','leaves','leaves','leaves']}
};
const BLOCK_LIST=['grass','dirt','stone','wood','leaves'];

// ===== MATERIAL CACHE =====
const matCache={};
function getBlockMat(type){
  if(matCache[type])return matCache[type];
  const b=BLOCKS[type];
  const mats=[
    new THREE.MeshLambertMaterial({map:TEX[b.tex[0]]}),
    new THREE.MeshLambertMaterial({map:TEX[b.tex[1]]}),
    new THREE.MeshLambertMaterial({map:TEX[b.tex[2]]}),
    new THREE.MeshLambertMaterial({map:TEX[b.tex[3]]}),
    new THREE.MeshLambertMaterial({map:TEX[b.tex[4]]}),
    new THREE.MeshLambertMaterial({map:TEX[b.tex[5]]})
  ];
  matCache[type]=mats;return mats;
}

function getSingleSideMat(type){
  if(!matCache[type+'_single']){
    matCache[type+'_single']=new THREE.MeshLambertMaterial({map:TEX[BLOCKS[type].tex[0]]});
  }
  return matCache[type+'_single'];
}

// ===== SCENE SETUP =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0x87CEEB,30,50);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,.1,100);
camera.position.set(8,4,8);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.prepend(renderer.domElement);

// Lighting
const ambient=new THREE.AmbientLight(0x8888ff,.5);scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffeedd,1.2);sun.position.set(20,30,10);scene.add(sun);
const fill=new THREE.DirectionalLight(0x88aaff,.4);fill.position.set(-10,10,-10);scene.add(fill);

// ===== WORLD =====
const W=16;const H=7;
const chunks={};
const geom=new THREE.BoxGeometry(1,1,1);

class Chunk{
  constructor(){
    this.mesh=new THREE.InstancedMesh(geom,getSingleSideMat('grass'),0);
    this.mesh.count=0;this.mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    this.blocks=[]; // flat array of {x,y,z,type}
    this.needsRebuild=false;
  }
  addBlock(x,y,z,type){
    this.blocks.push({x,y,z,type});
    this.needsRebuild=true;
  }
  removeBlock(x,y,z){
    const idx=this.blocks.findIndex(b=>b.x===x&&b.y===y&&b.z===z);
    if(idx>=0){this.blocks.splice(idx,1);this.needsRebuild=true;return true;}
    return false;
  }
  getBlock(x,y,z){
    return this.blocks.find(b=>b.x===x&&b.y===y&&b.z===z);
  }
  rebuild(){
    if(!this.needsRebuild)return;
    this.needsRebuild=false;
    // Remove old meshes
    if(this.mesh.parent){scene.remove(this.mesh);if(this.mesh.isInstancedMesh){this.mesh.geometry.dispose();if(Array.isArray(this.mesh.material))this.mesh.material.forEach(m=>m.dispose());else this.mesh.material.dispose();}else if(this.mesh.isGroup){this.mesh.traverse(c=>{if(c.isInstancedMesh){c.geometry.dispose();c.material.dispose();}});}}
    if(this._transparent){scene.remove(this._transparent);this._transparent.geometry.dispose();this._transparent.material.dispose();}
    this._transparent=null;

    const solid=[];const leaf=[];const leafMats=[];
    for(const b of this.blocks){
      if(b.type==='wood'){solid.push(b);}
      else if(b.type==='leaves'){leaf.push(b);leafMats.push(getSingleSideMat('leaves'));}
      else{solid.push(b);}
    }

    if(solid.length>0){
      const matList=[];
      // Group by type for multi-material
      const groups=this._groupByType(solid);
      const allMeshes=[];
      for(const g of groups){
        const m=new THREE.InstancedMesh(geom,getBlockMat(g.type),g.blocks.length);
        const dummy=new THREE.Object3D();
        for(let i=0;i<g.blocks.length;i++){
          const b=g.blocks[i];
          dummy.position.set(b.x+.5,b.y+.5,b.z+.5);
          dummy.updateMatrix();m.setMatrixAt(i,dummy.matrix);
        }
        m.instanceMatrix.needsUpdate=true;
        allMeshes.push(m);
      }
      if(allMeshes.length===1)this.mesh=allMeshes[0];
      else{
        this.mesh=new THREE.Group();
        for(const m of allMeshes)this.mesh.add(m);
      }
      scene.add(this.mesh);
    }else{
      this.mesh=new THREE.InstancedMesh(geom,getSingleSideMat('grass'),0);
      this.mesh.count=0;
    }

    // Leaves as transparent
    if(leaf.length>0){
      const lMat=new THREE.MeshLambertMaterial({map:TEX.leaves,transparent:true,opacity:.85,depthWrite:false,renderOrder:1});
      const lm=new THREE.InstancedMesh(geom,lMat,leaf.length);
      const dummy=new THREE.Object3D();
      for(let i=0;i<leaf.length;i++){
        const b=leaf[i];
        dummy.position.set(b.x+.5,b.y+.5,b.z+.5);
        dummy.updateMatrix();lm.setMatrixAt(i,dummy.matrix);
      }
      lm.instanceMatrix.needsUpdate=true;
      this._transparent=lm;
      scene.add(lm);
    }
  }
  _groupByType(blocks){
    const map={};
    for(const b of blocks){
      if(!map[b.type])map[b.type]=[];
      map[b.type].push(b);
    }
    return Object.keys(map).map(type=>({type,blocks:map[type]}));
  }
}

function chunkKey(x,y,z){return `${x>>4},${z>>4}`;}

function addBlock(x,y,z,type){
  const key=chunkKey(x,y,z);
  if(!chunks[key])chunks[key]=new Chunk();
  chunks[key].addBlock(x,y,z,type);
}

function removeBlock(x,y,z){
  const key=chunkKey(x,y,z);
  if(chunks[key])return chunks[key].removeBlock(x,y,z);
  return false;
}

function getBlock(x,y,z){
  const key=chunkKey(x,y,z);
  if(chunks[key])return chunks[key].getBlock(x,y,z);
  return null;
}

function rebuildAll(){
  for(const key of Object.keys(chunks))chunks[key].rebuild();
}

// ===== TERRAIN GENERATION =====
function generateWorld(){
  // Clear old water meshes
  for(const w of waterBlocks){if(w.mesh.parent)w.mesh.parent.remove(w.mesh);w.mesh.geometry.dispose();w.mesh.material.dispose();}
  waterBlocks=[];
  // Simple noise for height variation
  let seed=12345;
  function rand(){seed=(seed*1664525+1013904223)&0xFFFFFFFF;return (seed>>>0)/4294967296;}
  function noise(x,z){
    const xi=Math.floor(x/3);const zi=Math.floor(z/3);
    const xf=(x/3)-xi;const zf=(z/3)-zi;
    const tl=((xi*374761393+zi*668265263)&0x7FFFFFFF)/0x7FFFFFFF;
    const tr=(((xi+1)*374761393+zi*668265263)&0x7FFFFFFF)/0x7FFFFFFF;
    const bl=((xi*374761393+(zi+1)*668265263)&0x7FFFFFFF)/0x7FFFFFFF;
    const br=(((xi+1)*374761393+(zi+1)*668265263)&0x7FFFFFFF)/0x7FFFFFFF;
    const a=tl+(tr-tl)*xf;const b=bl+(br-bl)*xf;
    return a+(b-a)*zf;
  }

  // Heightmap terrain
  for(let x=0;x<W;x++){
    for(let z=0;z<W;z++){
      let h=Math.floor(noise(x,z)*4+1);
      if(h<0)h=0;if(h>3)h=3;
      if(h===0){addBlock(x,0,z,'grass');addWater(x,1,z);}
      else{
        addBlock(x,0,z,'grass');
        for(let y=1;y<h+1;y++)addBlock(x,y,z,'dirt');
        for(let y=h+1;y<H;y++)addBlock(x,y,z,'stone');
      }
    }
  }

  // Trees
  for(let t=0;t<8;t++){
    const tx=2+(rand()*12|0);const tz=2+(rand()*12|0);
    if(Math.abs(tx-8)<3&&Math.abs(tz-8)<3)continue;
    // Skip trees on water
    const hasWaterBelow=waterBlocks.some(w=>w.x===tx&&w.y===1&&w.z===tz)||waterBlocks.some(w=>w.x===tx&&w.y===2&&w.z===tz);
    if(hasWaterBelow)continue;
    // Trunk
    for(let h=1;h<=4;h++)addBlock(tx,h,tz,'wood');
    // Leaves
    for(let dx=-2;dx<=2;dx++){
      for(let dz=-2;dz<=2;dz++){
        if(Math.abs(dx)===2&&Math.abs(dz)===2&&rand()>.5)continue;
        if(Math.abs(dx)===2&&Math.abs(dz)===2&&rand()>.3)continue;
        const ly=5+(Math.abs(dx)<2&&Math.abs(dz)<2?0:-1);
        addBlock(tx+dx,ly,tz+dz,'leaves');
      }
    }
    // Top leaves
    for(let dx=-1;dx<=1;dx++){
      for(let dz=-1;dz<=1;dz++){
        if(Math.abs(dx)===1&&Math.abs(dz)===1)continue;
        addBlock(tx+dx,6,tz+dz,'leaves');
      }
    }
    addBlock(tx,7,tz,'leaves');
  }
}

generateWorld();
rebuildAll();

// ===== BLOCK HIGHLIGHT =====
const highlightGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.005, 1.005, 1.005));
const highlightMat = new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.5});
const highlightMesh = new THREE.LineSegments(highlightGeo, highlightMat);
highlightMesh.visible = false;
scene.add(highlightMesh);

function updateHighlight(){
  const sx=Math.floor(player.position.x),sz=Math.floor(player.position.z);
  const sy=Math.floor(player.position.y-0.1);
  raycaster.setFromCamera({x:0,y:0},camera);
  let bestDist=Infinity;let bestBlock=null;
  for(const key of Object.keys(chunks)){const chunk=chunks[key];
    for(const b of chunk.blocks){
      const bc=new THREE.Box3(new THREE.Vector3(b.x,b.y,b.z),new THREE.Vector3(b.x+1,b.y+1,b.z+1));
      if(!raycaster.ray.intersectsBox(bc))continue;
      const entry=raycaster.ray.intersectBox(bc,new THREE.Vector3());
      if(entry){const dist=raycaster.ray.origin.distanceTo(entry);
        if(dist<bestDist){bestDist=dist;bestBlock=b;}}}}
  if(bestBlock&&bestDist<6&&!(bestBlock.x===sx&&bestBlock.z===sz&&(bestBlock.y===sy||bestBlock.y===sy+1))){
    highlightMesh.position.set(bestBlock.x+0.5,bestBlock.y+0.5,bestBlock.z+0.5);highlightMesh.visible=true;document.getElementById('crosshair').classList.add('target');}
  else{highlightMesh.visible=false;document.getElementById('crosshair').classList.remove('target');}
}

// ===== SOUND =====
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();}
function playTone(f,d,vol,ty){if(!audioCtx)return;const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=ty||'square';o.frequency.value=f;g.gain.value=vol||0.1;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(d||0.1));o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+(d||0.1));}
function playDig(){playTone(200,0.1,0.08);}
function playPlace(){playTone(400,0.1,0.06);}
function playJump(){playTone(300,0.15,0.05,'sine');}

// ===== PARTICLES =====
const particles=[];
function spawnParticles(x,y,z,color){
  for(let i=0;i<12;i++){
    const g=new THREE.BoxGeometry(0.08,0.08,0.08);
    const m=new THREE.MeshLambertMaterial({color});
    const p=new THREE.Mesh(g,m);
    p.position.set(x+0.5,y+0.5,z+0.5);
    p.userData={vx:(Math.random()-0.5)*4,vy:Math.random()*4+1,vz:(Math.random()-0.5)*4,life:1};
    scene.add(p);particles.push(p);
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.userData.vy-=9.8*dt;
    p.position.x+=p.userData.vx*dt;p.position.y+=p.userData.vy*dt;p.position.z+=p.userData.vz*dt;
    p.userData.life-=dt*2;p.material.transparent=true;p.material.opacity=Math.max(0,p.userData.life);
    if(p.userData.life<=0){scene.remove(p);p.geometry.dispose();p.material.dispose();particles.splice(i,1);}
  }
}

// ===== INVENTORY =====
let inventory={'dirt':64,'grass':0,'stone':0,'wood':0,'leaves':0};
const blockColors={'grass':0x8BAA6E,'dirt':0x8B6E4E,'stone':0x808080,'wood':0x8B6E4E,'leaves':0x3C8C28};

// ===== WATER =====
let waterBlocks=[];
function addWater(x,y,z){
  const g=new THREE.BoxGeometry(1,1,1);
  const m=new THREE.MeshLambertMaterial({color:0x1B6A9E,transparent:true,opacity:0.6,depthWrite:false,renderOrder:-1});
  const mesh=new THREE.Mesh(g,m);
  mesh.position.set(x+0.5,y+0.5,z+0.5);
  scene.add(mesh);
  waterBlocks.push({x,y,z,mesh});
}
// ===== PLAYER =====
const player=new THREE.Object3D();
player.position.set(8,5,8);
const velocity=new THREE.Vector3();
let pitch=0,yaw=0;
const GRAVITY=-20;
const JUMP_SPEED=8;
const SPEED=4.5;
let onGround=true;
let pointerLocked=false;
let selectedSlot=0;

// Raycaster for block interaction
const raycaster=new THREE.Raycaster();
raycaster.far=6;

// ===== CONTROLS =====
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;
  if(e.code.startsWith('Digit')&&e.code[5]>='1'&&e.code[5]<='4'&&e.code[5]-'1'<BLOCK_LIST.length){
    selectedSlot=parseInt(e.code[5])-1;updateHotbar();
  }
  if(e.code==='Space')e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

document.addEventListener('mousemove',e=>{
  if(!pointerLocked)return;
  yaw-=e.movementX*.003;
  pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,pitch-e.movementY*.003));
  camera.quaternion.setFromEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
  player.quaternion.copy(camera.quaternion);
});

document.addEventListener('mousedown',e=>{
  if(!pointerLocked)return;
  if(e.button===0)hitBlock(); // left
  if(e.button===2)placeBlock(); // right
});
document.addEventListener('contextmenu',e=>e.preventDefault());

document.getElementById('blocker').addEventListener('click',()=>{
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange',()=>{
  pointerLocked=document.pointerLockElement===renderer.domElement;
  document.getElementById('blocker').style.display=pointerLocked?'none':'flex';
});

// ===== BLOCK INTERACTION =====
function hitBlock(){
  // Player standing position
  const standX=Math.floor(player.position.x),standZ=Math.floor(player.position.z);
  const standY=Math.floor(player.position.y-0.1);
  raycaster.setFromCamera({x:0,y:0},camera);
  // Check all blocks manually
  let bestDist=Infinity;let bestBlock=null;let bestNormal=null;

  // Iterate world blocks
  for(const key of Object.keys(chunks)){
    const chunk=chunks[key];
    for(const b of chunk.blocks){
      const bc=new THREE.Box3(
        new THREE.Vector3(b.x,b.y,b.z),
        new THREE.Vector3(b.x+1,b.y+1,b.z+1)
      );
      const intersected=raycaster.ray.intersectsBox(bc);
      if(!intersected)continue;
      // Find exact intersection by stepping
      const entry=raycaster.ray.intersectBox(bc,new THREE.Vector3());
      if(entry){
        const dist=raycaster.ray.origin.distanceTo(entry);
        if(dist<bestDist){
          bestDist=dist;
          bestBlock=b;
          // Determine normal
          const cc=new THREE.Vector3(b.x+.5,b.y+.5,b.z+.5);
          const diff=entry.clone().sub(cc);
          const ax=Math.abs(diff.x),ay=Math.abs(diff.y),az=Math.abs(diff.z);
          if(ax>=ay&&ax>=az)bestNormal=new THREE.Vector3(Math.sign(diff.x),0,0);
          else if(ay>=ax&&ay>=az)bestNormal=new THREE.Vector3(0,Math.sign(diff.y),0);
          else bestNormal=new THREE.Vector3(0,0,Math.sign(diff.z));
        }
      }
    }
  }
  if(bestBlock&&bestDist<6){
    // Dont break block under feet
    if(bestBlock.x===standX&&bestBlock.z===standZ&&(bestBlock.y===standY||bestBlock.y===standY+1))return;
    const bType=getBlock(bestBlock.x,bestBlock.y,bestBlock.z).type;
    removeBlock(bestBlock.x,bestBlock.y,bestBlock.z);
    for(const key of Object.keys(chunks))chunks[key].needsRebuild=true;
    rebuildAll();
    initAudio();playDig();
    const col=blockColors[bType]||0x888888;
    spawnParticles(bestBlock.x,bestBlock.y,bestBlock.z,col);
    if(inventory[bType]!==undefined)inventory[bType]++;
    updateInvCounts();
  }
}

function placeBlock(){
  raycaster.setFromCamera({x:0,y:0},camera);
  let bestDist=Infinity;let bestBlock=null;let bestNormal=null;

  for(const key of Object.keys(chunks)){
    const chunk=chunks[key];
    for(const b of chunk.blocks){
      const bc=new THREE.Box3(
        new THREE.Vector3(b.x,b.y,b.z),
        new THREE.Vector3(b.x+1,b.y+1,b.z+1)
      );
      const intersected=raycaster.ray.intersectsBox(bc);
      if(!intersected)continue;
      const entry=raycaster.ray.intersectBox(bc,new THREE.Vector3());
      if(entry){
        const dist=raycaster.ray.origin.distanceTo(entry);
        if(dist<bestDist){
          bestDist=dist;bestBlock=b;
          const cc=new THREE.Vector3(b.x+.5,b.y+.5,b.z+.5);
          const diff=entry.clone().sub(cc);
          const ax=Math.abs(diff.x),ay=Math.abs(diff.y),az=Math.abs(diff.z);
          if(ax>=ay&&ax>=az)bestNormal=new THREE.Vector3(Math.sign(diff.x),0,0);
          else if(ay>=ax&&ay>=az)bestNormal=new THREE.Vector3(0,Math.sign(diff.y),0);
          else bestNormal=new THREE.Vector3(0,0,Math.sign(diff.z));
        }
      }
    }
  }
  if(bestBlock&&bestNormal&&bestDist<6){
    const nx=bestBlock.x+bestNormal.x;
    const ny=bestBlock.y+bestNormal.y;
    const nz=bestBlock.z+bestNormal.z;
    // Check not inside player
    const px=Math.floor(player.position.x);
    const py=Math.floor(player.position.y-1.5);
    const pz=Math.floor(player.position.z);
    if(nx===px&&ny===py&&nz===pz)return;
    if(nx===px&&ny===py+1&&nz===pz)return;
    if(!getBlock(nx,ny,nz)){
      const selType=BLOCK_LIST[selectedSlot];
      if(inventory[selType]>0||selType==='dirt'||selType==='stone'||selType==='grass'){
        addBlock(nx,ny,nz,selType);
        for(const key of Object.keys(chunks))chunks[key].needsRebuild=true;
        rebuildAll();
        initAudio();playPlace();
        if(inventory[selType]!==undefined&&inventory[selType]>0)inventory[selType]--;
        updateInvCounts();
      }
    }
  }
}

// ===== COLLISION =====
function collides(x,y,z){
  return getBlock(Math.floor(x),Math.floor(y),Math.floor(z))!==null;
}

function canMoveTo(x,y,z){
  const bx=Math.floor(x),by=Math.floor(y),bz=Math.floor(z);
  const r=.29,h=1.7;
  // Swept AABB - check 11 points for better edge detection
  const checks=[[-r,-h/2,-r],[-r,-h/2,r],[r,-h/2,-r],[r,-h/2,r],
                [-r,h/2,-r],[-r,h/2,r],[r,h/2,-r],[r,h/2,r],
                [0,0,0],[0,-h/2,0],[0,h/2,0]];
  for(const [dx,dy,dz] of checks){
    const cx=bx+0.5+dx,cy=by+1+dy,cz=bz+0.5+dz;
    if(collides(Math.floor(cx),Math.floor(cy),Math.floor(cz)))return false;
  }
  return true;
}

// ===== HOTBAR =====
const hotbarEl=document.getElementById('hotbar');
const iconCanvases=[];
for(let i=0;i<BLOCK_LIST.length;i++){
  const slot=document.createElement('div');slot.className='slot'+(i===0?' active':'');
  const c=document.createElement('canvas');c.width=32;c.height=32;
  const ctx=c.getContext('2d');
  const name=BLOCK_LIST[i];
  const tex=TEX[BLOCKS[name].tex[0]];
  // Draw face
  ctx.drawImage(tex.image,0,0,32,32);
  slot.appendChild(c);
  slot.title=BLOCKS[name].name;
  slot.addEventListener('click',()=>{selectedSlot=i;updateHotbar();});
  hotbarEl.appendChild(slot);
  iconCanvases.push(c);
  // Init inventory count display
  const countEl=document.createElement('span');countEl.className='inv-count';
  countEl.textContent='';slot.appendChild(countEl);
}
function updateHotbar(){
  const slots=hotbarEl.querySelectorAll('.slot');
  slots.forEach((s,i)=>{s.className='slot'+(i===selectedSlot?' active':'');});
}
function updateInvCounts(){
  const slots=hotbarEl.querySelectorAll('.slot');
  slots.forEach((s,i)=>{
    const name=BLOCK_LIST[i];
    const count=inventory[name];
    let countEl=s.querySelector('.inv-count');
    if(countEl)countEl.textContent=count>0?count:'';
  });
}

// ===== GAME LOOP =====
const clock=new THREE.Clock();

function update(){
  const dt=Math.min(clock.getDelta(),.05);
  updateHighlight();
  updateParticles(dt);

  // Mouse look
  if(pointerLocked){
    camera.quaternion.setFromEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
    player.quaternion.copy(camera.quaternion);
  }

  // Movement
  if(pointerLocked){
    const forward=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    forward.y=0;forward.normalize();
    const right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
    right.y=0;right.normalize();

    const moveDir=new THREE.Vector3();
    if(keys['KeyW'])moveDir.add(forward);
    if(keys['KeyS'])moveDir.sub(forward);
    if(keys['KeyA'])moveDir.sub(right);
    if(keys['KeyD'])moveDir.add(right);
    if(moveDir.length()>0)moveDir.normalize().multiplyScalar(SPEED*dt);

    // Try X
    const px=player.position.x+moveDir.x;
    if(canMoveTo(px,player.position.y,player.position.z)){
      player.position.x=px;
    }
    // Try Z
    const pz=player.position.z+moveDir.z;
    if(canMoveTo(player.position.x,player.position.y,pz)){
      player.position.z=pz;
    }

    // Gravity
    velocity.y+=GRAVITY*dt;
    if(keys['Space']&&onGround){velocity.y=JUMP_SPEED;onGround=false;initAudio();playJump();}

    // Try Y
    const py=player.position.y+velocity.y*dt;
    if(canMoveTo(player.position.x,py,player.position.z)){
      player.position.y=py;
      onGround=false;
    }else{
      if(velocity.y<0)onGround=true;
      velocity.y=0;
    }

    // Void detection - respawn if fallen out
  if(player.position.y<-16){
    player.position.set(8,12,8);velocity.set(0,0,0);onGround=false;
  }
  // Clamp to world
    player.position.x=Math.max(.5,Math.min(W-.5,player.position.x));
    player.position.z=Math.max(.5,Math.min(W-.5,player.position.z));
    if(player.position.y<.5){player.position.y=.5;velocity.y=0;onGround=true;}
  }

  // Camera follows player
  camera.position.copy(player.position);
  camera.position.y+=1.6; // eye height

  renderer.render(scene,camera);
  requestAnimationFrame(update);
}

// ===== RESIZE =====
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Initial inventory display
updateInvCounts();
// Start
update();

// Expose for debugging
window._scene=scene;window._player=player;
</script>
