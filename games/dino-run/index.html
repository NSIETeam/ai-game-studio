<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小恐龙跑酷 🦖 | AI Game Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
#ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;pointer-events:none;z-index:10}
#ui h1{font-size:clamp(24px,5vw,48px);margin-bottom:12px;text-shadow:0 0 20px rgba(108,92,231,.6)}
#ui p{font-size:clamp(14px,2.5vw,20px);opacity:.8;margin-bottom:8px}
#ui .emoji{font-size:clamp(40px,8vw,80px);margin-bottom:16px}
#score{position:absolute;top:20px;right:20px;color:#fff;font-size:clamp(18px,3vw,28px);font-family:'Courier New',monospace;text-shadow:0 0 10px rgba(0,184,148,.4);z-index:10}
#score span{color:#00b894}
#highScore{position:absolute;top:20px;left:20px;color:rgba(255,255,255,.4);font-size:clamp(12px,2vw,16px);font-family:'Courier New',monospace;z-index:10}
#instructions{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:clamp(10px,1.5vw,13px);font-family:'Courier New',monospace;z-index:10;pointer-events:none}
.mobile-ctrl{position:absolute;bottom:40px;right:40px;width:80px;height:80px;border-radius:50%;background:rgba(108,92,231,.15);border:2px solid rgba(108,92,231,.3);display:flex;align-items:center;justify-content:center;font-size:30px;color:#6c5ce7;z-index:20;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.mobile-ctrl:active{background:rgba(108,92,231,.35)}
@media(min-width:769px){.mobile-ctrl{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score">🏆 <span id="scoreDisplay">0</span></div>
<div id="highScore">👑 BEST: <span id="highDisplay">0</span></div>
<div id="ui">
  <div class="emoji">🦖</div>
  <h1>小恐龙跑酷</h1>
  <p>按 <b>空格</b> 或 <b>点击</b> 跳跃</p>
  <p style="font-size:12px;opacity:.5">🎮 AI Game Studio · 多 Agent 协作出品</p>
</div>
<div id="instructions">space / tap to jump · survive as long as you can</div>
<div class="mobile-ctrl" id="jumpBtn">⬆</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('scoreDisplay'),highEl=document.getElementById('highDisplay'),uiEl=document.getElementById('ui')
const COLORS={sky1:'#1a1a2e',sky2:'#16213e',ground:'#2d3436',groundLine:'#00b894',dino:'#6c5ce7',dinoEye:'#fff',obstacle:'#e17055',obstacle2:'#fd79a8',cloud:'rgba(255,255,255,.15)',star:'rgba(255,255,255,.6)',grass:'#00b894',particle:'#ffd700'}
const G=0.8,JF=-14,GYR=0.75,BS=6,MS=18,SC=60
let W,H,GY,gs='menu',sc=0,hs=parseInt(localStorage.getItem('dinoHigh')||'0'),sp=BS,f=0,st=0,obs=[],clds=[],parts=[],stars=[],go=0,dino
function D(){this.x=80,this.y=0,this.w=36,this.h=44,this.vy=0,this.j=!1,this.rf=0,this.rt=0,this.resetY()}
D.prototype={resetY(){this.y=GY-this.h},jump(){if(!this.j){this.vy=JF;this.j=!0}},update(){this.vy+=G,this.y+=this.vy;if(this.y>=GY-this.h){this.y=GY-this.h;this.vy=0;this.j=!1}this.rt++;if(this.rt>6){this.rf=(this.rf+1)%2;this.rt=0}if(!this.j&&f%4===0)parts.push({x:this.x+5,y:GY-2,vx:-Math.random()*2-1,vy:-Math.random()*1.5,lf:20,ml:20,sz:Math.random()*3+2,cl:COLORS.grass})},draw(){ctx.fillStyle=COLORS.dino;ctx.shadowColor=COLORS.dino;ctx.shadowBlur=15;ctx.beginPath();ctx.roundRect(this.x,this.y,this.w,this.h,6);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle=COLORS.dino;ctx.beginPath();ctx.roundRect(this.x+20,this.y-8,20,16,4);ctx.fill();ctx.fillStyle=COLORS.dinoEye;ctx.beginPath();ctx.arc(this.x+32,this.y-4,3,0,Math.PI*2);ctx.fill();ctx.fillRect(this.x+36,this.y+1,4,2);ctx.fillStyle=COLORS.dino;const lo=this.j?0:(this.rf===0?-3:3);ctx.fillRect(this.x+6,this.y+this.h-2,8,6+lo);ctx.fillRect(this.x+22,this.y+this.h-2,8,6-lo);ctx.fillRect(this.x-6,this.y+10,6,4)}}
function O(t){this.t=t!==undefined?t:Math.floor(Math.random()*3);this.x=W+20;this.w=[20,28,16][this.t];this.h=[24,32,28][this.t];this.y=GY-this.h;this.p=!1}
O.prototype={update(){this.x-=sp},draw(){const c=this.t===0?COLORS.obstacle:this.t===1?COLORS.obstacle2:'#00cec9';ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=10;if(this.t===0){ctx.fillRect(this.x,this.y,this.w,this.h);ctx.fillRect(this.x-5,this.y-8,6,14);ctx.fillRect(this.x+this.w-1,this.y-6,6,12);ctx.fillStyle='#d63031';ctx.fillRect(this.x+4,this.y-4,3,4);ctx.fillRect(this.x+13,this.y-3,3,3)}else if(this.t===1){ctx.beginPath();ctx.roundRect(this.x,this.y,this.w,this.h,4);ctx.fill()}else{ctx.beginPath();ctx.roundRect(this.x,this.y,this.w,this.h,8);ctx.fill();ctx.fillRect(this.x-4,this.y+4,6,3);ctx.fillRect(this.x+this.w-2,this.y+4,6,3)}ctx.shadowBlur=0}}
function C(){this.r(true)}
C.prototype={r(i){this.x=i?Math.random()*W:W+Math.random()*100;this.y=Math.random()*(GY*.5)+20;this.w=Math.random()*80+40;this.s=Math.random()*.3+.1;this.o=Math.random()*.08+.04},u(){this.x-=this.s;if(this.x+this.w<-50)this.r()},d(){ctx.fillStyle='rgba(255,255,255,'+this.o+')';ctx.beginPath();ctx.ellipse(this.x+this.w/2,this.y,this.w/2,12,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(this.x+this.w*.3,this.y-8,this.w*.3,8,0,0,Math.PI*2);ctx.fill()}}
function cc(a,b){const sk=4;return a.x+sk<b.x+b.w&&a.x+a.w-sk>b.x&&a.y+sk<b.y+b.h&&a.y+a.h-sk>b.y}
function init(){rs();clds=Array.from({length:6},()=>new C());stars=Array.from({length:SC},()=>({x:Math.random()*1e4,y:Math.random()*GY,sz:Math.random()*1.5+.5,sp:Math.random()*.02+.01}));highEl.textContent=hs;loop()}
function rs(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;GY=H*GYR;if(dino)dino.resetY()}
function reset(){dino=new D();obs=[];parts=[];sc=0;sp=BS;st=0;f=0;gs='playing';uiEl.style.display='none';highEl.textContent=hs}
function loop(){f++;upd();drw();requestAnimationFrame(loop)}
function upd(){if(gs==='playing'){sp=Math.min(MS,BS+Math.floor(sc/500));dino.update();st++;const iv=Math.max(40,100-sp*3);if(st>iv){st=0;obs.push(new O())}obs=obs.filter(o=>{o.update();if(!o.p&&o.x+o.w<dino.x){o.p=true;sc+=10}if(cc(dino,o)){go2();return false}return o.x>-50});sc++;scoreEl.textContent=Math.floor(sc/10);parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.lf--;p.vy+=.05;return p.lf>0})}clds.forEach(c=>c.u());go=(go+sp)%W}
function drw(){const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,COLORS.sky1);bg.addColorStop(.5,COLORS.sky2);bg.addColorStop(1,'#0f0f23');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);stars.forEach(s=>{ctx.fillStyle=COLORS.star;ctx.beginPath();ctx.arc((s.x+go*s.sp)%W,s.y,s.sz,0,Math.PI*2);ctx.fill()});clds.forEach(c=>c.d());ctx.fillStyle=COLORS.ground;ctx.fillRect(0,GY,W,H-GY);ctx.fillStyle=COLORS.groundLine;ctx.shadowColor=COLORS.groundLine;ctx.shadowBlur=10;for(let x=-go%40;x<W+40;x+=40)ctx.fillRect(x,GY,20,2);ctx.shadowBlur=0;ctx.fillStyle=COLORS.grass;for(let x=-go%60;x<W+60;x+=60){const h=Math.sin(x*.5)*4+6;ctx.fillRect(x,GY-h+2,2,h);ctx.fillRect(x+30,GY-h/2+2,2,h/2)}parts.forEach(p=>{ctx.globalAlpha=p.lf/p.ml;ctx.fillStyle=p.cl;ctx.fillRect(p.x,p.y,p.sz,p.sz)});ctx.globalAlpha=1;obs.forEach(o=>o.draw());if(gs!=='gameover')dino.draw();if(gs==='playing'){ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='14px "Courier New",monospace';ctx.textAlign='right';ctx.fillText('SPEED '+Math.floor(sp),W-20,50)}if(gs==='gameover'){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold clamp(28px,5vw,48px) "Courier New",monospace';ctx.fillText('GAME OVER',W/2,H/2-60);ctx.font='clamp(18px,3vw,28px) "Courier New",monospace';ctx.fillStyle='#6c5ce7';ctx.fillText('🏆 '+Math.floor(sc/10),W/2,H/2);ctx.font='clamp(14px,2vw,18px) "Courier New",monospace';ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillText('Tap / Space to restart',W/2,H/2+40)}}
function go2(){if(gs==='gameover')return;gs='gameover';const fs=Math.floor(sc/10);if(fs>hs){hs=fs;localStorage.setItem('dinoHigh',String(hs));highEl.textContent=hs}for(let i=0;i<20;i++)parts.push({x:dino.x+dino.w/2,y:dino.y+dino.h/2,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10-3,lf:30,ml:30,sz:Math.random()*4+2,cl:COLORS.particle})}
function hi(){if(gs==='menu'){uiEl.style.display='none';reset()}else if(gs==='playing')dino.jump();else if(gs==='gameover')reset()}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.key===' '||e.key==='ArrowUp'){e.preventDefault();hi()}})
document.addEventListener('keyup',e=>{if(e.code==='Space'||e.key===' ')e.preventDefault()})
canvas.addEventListener('click',hi);canvas.addEventListener('touchstart',e=>{e.preventDefault();hi()})
document.getElementById('jumpBtn').addEventListener('click',e=>{e.stopPropagation();hi()})
document.getElementById('jumpBtn').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();hi()})
window.addEventListener('resize',rs)
window.addEventListener('load',()=>{if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r];const tl=r[0]||0;this.moveTo(x+tl,y);this.lineTo(x+w-tl,y);this.quadraticCurveTo(x+w,y,x+w,y+tl);this.lineTo(x+w,y+h-tl);this.quadraticCurveTo(x+w,y+h,x+w-tl,y+h);this.lineTo(x+tl,y+h);this.quadraticCurveTo(x,y+h,x-tl,y+h);this.lineTo(x,y+tl);this.quadraticCurveTo(x,y,x+tl,y);this.closePath();return this}}init()})
</script>
</body>
</html>
